name: Build & Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/codeminse/blood-line-frontend

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect what changed
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "${{ github.event_name }}" != "push" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            echo "nginx=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BEFORE" HEAD > changed.txt
          cat changed.txt
          if grep -qv '^deploy/nginx/' changed.txt; then echo "app=true" >> "$GITHUB_OUTPUT"; else echo "app=false" >> "$GITHUB_OUTPUT"; fi
          if grep -q  '^deploy/nginx/' changed.txt; then echo "nginx=true" >> "$GITHUB_OUTPUT"; else echo "nginx=false" >> "$GITHUB_OUTPUT"; fi

      - name: Login to GHCR
        if: steps.changes.outputs.app == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.app == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.changes.outputs.app == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.fenibloodline.com
            NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyC0_-DbZOcRupidAtLZnfvRuSX2zTAdVvQ
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=feni-blood-line-2062a.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=feni-blood-line-2062a
            NEXT_PUBLIC_FIREBASE_APP_ID=1:68824200452:web:40c1c440570331ba71cc51

      - name: Deploy on VPS (with retries)
        uses: nick-fields/retry@v3
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          APP_CHANGED: ${{ steps.changes.outputs.app }}
          NGINX_CHANGED: ${{ steps.changes.outputs.nginx }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        with:
          timeout_minutes: 20
          max_attempts: 5
          retry_wait_seconds: 45
          command: |
            mkdir -p ~/.ssh
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              "$VPS_USER@$VPS_HOST" \
              "APP_CHANGED='$APP_CHANGED' NGINX_CHANGED='$NGINX_CHANGED' GHCR_TOKEN='$GHCR_TOKEN' GHCR_USER='$GHCR_USER' REPO='$REPO' SHA='$SHA' bash -s" \
              < deploy/remote-deploy.sh
