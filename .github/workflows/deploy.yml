name: Build & Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/codeminse/blood-line-frontend

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect what changed
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "${{ github.event_name }}" != "push" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            echo "nginx=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BEFORE" HEAD > changed.txt
          cat changed.txt
          if grep -qv '^deploy/nginx/' changed.txt; then echo "app=true" >> "$GITHUB_OUTPUT"; else echo "app=false" >> "$GITHUB_OUTPUT"; fi
          if grep -q  '^deploy/nginx/' changed.txt; then echo "nginx=true" >> "$GITHUB_OUTPUT"; else echo "nginx=false" >> "$GITHUB_OUTPUT"; fi

      - name: Login to GHCR
        if: steps.changes.outputs.app == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.app == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.changes.outputs.app == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.fenibloodline.com
            NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyC0_-DbZOcRupidAtLZnfvRuSX2zTAdVvQ
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=feni-blood-line-2062a.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=feni-blood-line-2062a
            NEXT_PUBLIC_FIREBASE_APP_ID=1:68824200452:web:40c1c440570331ba71cc51

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/*"
          target: /opt/feni/frontend
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          APP_CHANGED: ${{ steps.changes.outputs.app }}
          NGINX_CHANGED: ${{ steps.changes.outputs.nginx }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_CHANGED,NGINX_CHANGED,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            if [ "$NGINX_CHANGED" = "true" ]; then
              if [ -f /etc/letsencrypt/live/fenibloodline.com/fullchain.pem ]; then
                echo ">> Updating nginx config"
                cp /opt/feni/frontend/deploy/nginx/fenibloodline.com.conf /etc/nginx/sites-available/fenibloodline.com.conf
                ln -sf /etc/nginx/sites-available/fenibloodline.com.conf /etc/nginx/sites-enabled/fenibloodline.com.conf
                nginx -t && systemctl reload nginx
              else
                echo ">> TLS cert not issued yet, keeping bootstrap config (run certbot on the VPS first)"
              fi
            else
              echo ">> No nginx changes, skipping"
            fi
            if [ "$APP_CHANGED" = "true" ]; then
              echo ">> Deploying new image"
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
              cd /opt/feni/frontend/deploy
              docker compose pull
              docker compose up -d
              docker image prune -f
            else
              echo ">> No app changes, skipping"
            fi
